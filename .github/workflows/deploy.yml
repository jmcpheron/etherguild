name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Setup environment
        run: cp .env.example .env.development
      
      - name: Install dependencies
        run: bun install
        
      - name: Configure Next.js for static export
        run: |
          # Make sure there's no conflicting config file
          rm -f next.config.mjs
          
          # Update the TypeScript config file
          sed -i 's/const nextConfig: NextConfig = {/const nextConfig: NextConfig = {\n  output: "export",/' next.config.ts
      
      - name: Remove API routes
        run: |
          # Remove the API routes that can't be exported statically
          rm -rf app/api
      
      - name: Build static site
        run: bun run build
        env:
          NEXT_PUBLIC_BASE_PATH: /etherguild
          NODE_ENV: development
      
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages